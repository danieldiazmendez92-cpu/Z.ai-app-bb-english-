name: Pull Request Labeler

# Auto-etiqueta PRs según los paths de archivos cambiados.
# Usa actions/labeler@v5 con config en .github/labeler.yml.
# Los labels deben existir en el repo (fueron creados por el Agente A en P0-A:
# feature/auth, feature/onboarding, feature/home, feature/library, feature/story,
# feature/progress, feature/parent, feature/subscription, feature/child-profile,
# infra, chore, compliance, docs, testing).

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    name: Apply labels by changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (labeler config)
        uses: actions/checkout@v7

      - name: Label PR based on changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true # remueve labels si los paths ya no aplican

  size:
    name: Add size label
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Compute size and label
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: '10'
          s_max_size: '100'
          m_max_size: '500'
          l_max_size: '1000'
          fail_if_xl: 'false'
          message_if_xl: >
            Este PR es muy grande (>1000 líneas). Considerá dividirlo en PRs más chicos
            para facilitar el review y reducir el riesgo de bugs.
