name: CI

# Workflow principal de Integración Continua.
# Se ejecuta en cada Pull Request hacia `main` o `develop` y en cada push a `develop`.
# Validaciones: analyze (flutter analyze + dart_code_metrics), unit-tests (con coverage),
# firestore-rules-tests (vitest + @firebase/rules-unit-testing) e integration-tests
# (Firebase Emulator Suite + flutter test integration_test) en macOS.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

# Cancela runs anteriores de la misma rama/PR para ahorrar runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Flutter lint + metrics)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Read pubspec dependencies
        run: flutter pub get

      - name: Run build_runner (genera *.g.dart / *.freezed.dart)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Dart Code Metrics (strict)
        run: dart run dart_code_metrics:metrics lib --ruleset=strict

  unit-tests:
    name: Unit & Widget tests (coverage)
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        run: flutter test --coverage --coverage-path=coverage/lcov.info --test-randomize-ordering-seed random

      - name: Check coverage threshold (>= 70%)
        # Fail step if overall coverage drops below the project minimum.
        # Uses lcov info file produced by `flutter test --coverage`.
        run: |
          set -e
          if [ ! -f coverage/lcov.info ]; then
            echo "coverage/lcov.info not found. Tests produced no coverage data."
            exit 1
          fi
          # Install lcov for geninfo / lcov utilities (already present on ubuntu-latest, just in case)
          sudo apt-get update -qq && sudo apt-get install -y -qq lcov
          COVERAGE=$(lcov --summary coverage/lcov.info 2>/dev/null | grep -Po 'lines\.*: \K[0-9.]+%' | tr -d '%' | head -n1)
          echo "Total line coverage: ${COVERAGE}%"
          THRESHOLD=70
          AWK=$(awk -v c="$COVERAGE" -v t="$THRESHOLD" 'BEGIN { exit (c+0 >= t) ? 0 : 1 }')
          if [ $? -ne 0 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the minimum threshold of ${THRESHOLD}%."
            exit 1
          fi
          echo "Coverage OK (${COVERAGE}% >= ${THRESHOLD}%)"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: flutter,unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  firestore-rules-tests:
    name: Firestore rules + Cloud Functions tests
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 15
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run vitest (rules-unit-testing + functions tests)
        run: npm test -- --reporter=default --reporter=junit --outputFile=test-results.xml

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firestore-rules-test-results
          path: firebase/functions/test-results.xml
          if-no-files-found: ignore
          retention-days: 7

  integration-tests:
    name: Integration tests (Firebase Emulator)
    runs-on: macos-latest
    needs: [unit-tests, firestore-rules-tests]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Install Cloud Functions deps (needed for emulator)
        run: |
          cd firebase/functions
          npm ci
          npm run build

      - name: Flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Start Firebase Emulator
        working-directory: firebase
        run: |
          firebase emulators:start --only auth,firestore,functions,storage,pubsub,scheduler --project demo-storyenglish-kids &
          EMULATOR_PID=$!
          echo "EMULATOR_PID=$EMULATOR_PID" >> $GITHUB_ENV
          # Wait for emulator to be ready (max 60s)
          for i in {1..30}; do
            if curl -s http://127.0.0.1:4400/emulators | grep -q "firestore"; then
              echo "Emulator is ready after ${i}*2 seconds."
              break
            fi
            sleep 2
          done
          curl -s http://127.0.0.1:4400/emulators || (echo "Emulator did not start in time" && exit 1)

      - name: Run integration tests
        env:
          FLUTTER_TEST_EMULATOR_ENDPOINT: http://127.0.0.1:8080
        run: flutter test integration_test --test-randomize-ordering-seed random

      - name: Stop Firebase Emulator
        if: always()
        run: |
          if [ -n "$EMULATOR_PID" ]; then
            kill $EMULATOR_PID 2>/dev/null || true
          fi
          # Fallback: kill any leftover java/firebase processes
          pkill -f "firebase emulators" 2>/dev/null || true
